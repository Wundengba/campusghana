# Netlify configuration to prevent index.html caching issues
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Optional: Serve all routes from index.html for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
